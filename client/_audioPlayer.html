  <template
    data-widget
    data-id="audioPlayer"
    data-category="media"
    data-title="Audio Player"
  >
    <div class="cover">
      <img src="#" alt="cover">
    </div>
    <div data-role="track" class="track-name"></div>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
    <div class="audio-controls">
      <audio id="audio"></audio>
    
      <button data-action="prev">⏮</button>
      <button data-action="play">▶</button>
      <button data-action="next">⏭</button>
    </div>
    
    <div data-role="playlist" class="playlist"></div>
    <div class="func">
      <button data-action="plus">+</button>
      <button data-action="minus">-</button>
      <button data-action="delete">D</button>
    </div>
  </template>
