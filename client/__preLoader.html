<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader Example</title>
<style>
  /* Полноэкранный контейнер */
  #app-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
    color: white;
    text-align: center;
  }

  /* Контейнер контента loader */
  .loader-content {
    width: 80%;
    max-width: 320px;
    min-width: 220px;
  }

  /* Спиннер */
  .spinner {
    width: 50px;
    height: 50px;
    margin: 0 auto 15px auto;
    border: 5px solid rgba(255, 255, 255, 0.3);
    border-top: 5px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Текст */
  #loader-text {
    font-size: 1rem;
    margin-bottom: 15px;
    word-wrap: break-word;
  }

  /* Прогресс-бар */
  .progress {
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    overflow: hidden;
  }

  .progress-bar {
    width: 0%;
    height: 100%;
    background: white;
    transition: width 0.3s ease;
  }

  /* Адаптивность под маленькие экраны */
  @media (max-width: 400px) {
    .spinner {
      width: 40px;
      height: 40px;
      border-width: 4px;
    }
    #loader-text {
      font-size: 0.9rem;
    }
    .progress {
      height: 6px;
    }
  }
</style>
</head>
<body>



<!-- Контент приложения -->
<div id="app-content" style="display:none;">
  <h1>Приложение загружено!</h1>
  <p>Содержимое вашего приложения здесь.</p>
</div>

<script>
  // Простейший eventBus
  const eventBus = {
    events: {},
    on(event, callback) {
      (this.events[event] ||= []).push(callback);
    },
    emit(event, data) {
      (this.events[event] || []).forEach(cb => cb(data));
    }
  };

  // Модули для загрузки
  const requiredModules = ['database', 'ws', 'storage', 'binanceApiWidget'];
  const loadedModules = new Set();

  const progressEl = document.getElementById('loader-progress');
  const textEl = document.getElementById('loader-text');
  const loaderEl = document.getElementById('app-loader');
  const appContent = document.getElementById('app-content');

  // Подписка на события
  eventBus.on('module:loading', name => {
    textEl.textContent = `Загрузка: ${name}...`;
  });

  eventBus.on('module:ready', name => {
    loadedModules.add(name);
    updateProgress();

    if (loadedModules.size === requiredModules.length) {
      finishLoader();
    }
  });

  eventBus.on('module:error', err => {
    textEl.textContent = `Ошибка: ${err}`;
  });

  function updateProgress() {
    const percent = (loadedModules.size / requiredModules.length) * 100;
    progressEl.style.width = percent + '%';
  }

  function finishLoader() {
    progressEl.style.width = '100%';
    textEl.textContent = 'Готово';
    
    // плавное скрытие и удаление loader
    loaderEl.style.transition = 'opacity 0.5s, transform 0.5s';
    loaderEl.style.opacity = '0';
    loaderEl.style.transform = 'scale(0.95)';
    setTimeout(() => {
      loaderEl.remove();
      appContent.style.display = 'block'; // показываем приложение
    }, 500);
  }

  // Имитируем модули (для примера)
  function simulateModule(name, delay = 800) {
    return new Promise(resolve => {
      eventBus.emit('module:loading', name);
      setTimeout(() => {
        eventBus.emit('module:ready', name);
        resolve();
      }, delay);
    });
  }

  // Запуск всех модулей
  async function initApp() {
    for (let mod of requiredModules) {
      await simulateModule(mod, 500 + Math.random() * 500);
    }
  }

  initApp();
</script>

</body>
</html>
