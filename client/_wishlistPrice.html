<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>DashboardX</title>
</head>
<body>
  <template
    data-widget
    data-id="wishlistPrice"
    data-category="finance"
    data-title="Wishlist Price"
  >
    <div class="wishlist-price">
      <div class="new">
        <input class="input" type="file" data-input="image" placeholder="image">
        <input class="input" type="text" data-input="name" placeholder="name">
        <input class="input" type="text" data-input="description" placeholder="description">
        <input class="input" type="number" data-input="price" step="0.01" min="0" placeholder="price">
        <button class="btn blue-background" type="button" data-action="submit-new">add</button>
      </div>
      <div class="list">
        <div class="item">
          <div class="block">
            <div class="img"></div>
            <div class="info">
              <div class="title">
                <div class="name">OnePlus 13</div>
                <div class="price">$940+</div>
              </div>
              <div class="description">[S8Elite 16GB 512GB]</div>
            </div>
          </div>
          <div class="progress-bar"></div>
        </div>
        <div class="item">
          <div class="block">
            <div class="img"></div>
            <div class="info">
              <div class="title">
                <div class="name">OnePlus Pad 3</div>
                <div class="price">$750+</div>
              </div>
              <div class="description">[S8Elite 16GB 512GB]</div>
            </div>
          </div>
          <div class="progress-bar"></div>
        </div>
        <div class="item">
          <div class="block">
            <div class="img"></div>
            <div class="info">
              <div class="title">
                <div class="name">MacBook Pro 13 2020</div>
                <div class="price">$800+</div>
              </div>
              <div class="description">[Core i7 16GB 512GB]</div>
            </div>
          </div>
          <div class="progress-bar"></div>
        </div>
        <div class="item">
          <div class="block">
            <div class="img"></div>
            <div class="info">
              <div class="title">
                <div class="name">1 Ethirium Coin</div>
                <div class="price">$3000+</div>
              </div>
              <div class="description">[Info]</div>
            </div>
          </div>
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
  </template>
  
  <template id="iconSize" data-ui="icon" data-action="size">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 10V4h6"/>
      <path d="M20 14v6h-6"/>
    </svg>
  </template>
  <template id="iconSave" data-ui="icon" data-action="save">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h14l2 2v14H4z"/>
      <path d="M16 4v6H8V4"/>
      <rect x="8" y="14" width="8" height="4" rx="1"/>
    </svg>
  </template>
  <template id="iconPin" data-ui="icon" data-action="pin">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 4l6 6"/>
      <path d="M8 10l6 6"/>
      <path d="M9 15l-5 5"/>
      <path d="M15 9l5-5"/>
    </svg>
  </template>
  <template id="iconHide" data-ui="icon" data-action="hide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
      <circle cx="12" cy="12" r="3"/>
      <path d="M3 3l18 18"/>
    </svg>
  </template>
  <template id="iconFavorite" data-ui="icon" data-action="favorite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 17.8 6.1 21l1.2-6.5L2.5 9.9l6.6-.9z"/>
    </svg>
  </template>
  <template id="iconWorkplace" data-ui="icon" data-action="workplace">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  </template>

  <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
  <script type="module" src="./js/index.js"></script>
</body>
</html>
