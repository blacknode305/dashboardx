<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>DashboardX</title>
</head>
<body>
  <template
    data-widget
    data-id="moneyConvertApi"
    data-category="finance"
    data-title="Money Convert Api"
  >
    <div>
      <div>
        <select class="select">
          <option class="option" value="">add new valute</option>
          <option class="option" value="eth">eth/usd</option>
          <option class="option" value="btc">btc/usd</option>
        </select>
        <button class="btn blue-background" data-action="add-valute">add valute</button>
      </div>
      <br>
      <div>
        <div class="finance-summary">
          <span>kzt/usd:</span>
          <span class="yellow-color" data-role="rate-kzt">0</span>
        </div>
        <div class="finance-summary">
          <span>kzt/rub:</span>
          <span class="yellow-color" data-role="rate-rub">0</span>
        </div>
        <div class="finance-summary">
          <span>rub/usd:</span>
          <span class="yellow-color" data-role="rate-rub-usd">0</span>
        </div>
        <div class="finance-summary">
          <span>eth/usd:</span>
          <span class="yellow-color" data-role="rate-eth-m">0</span>
        </div>
        <div class="finance-summary">
          <span>eth/usdt:</span>
          <span class="yellow-color" data-role="rate-eth">0</span>
        </div>
        <div class="finance-summary">
          <span>eth/kzt:</span>
          <span class="yellow-color" data-role="rate-eth-kzt">0</span>
        </div>
        <div class="finance-summary">
          <span>eth/rub:</span>
          <span class="yellow-color" data-role="rate-eth-rub">0</span>
        </div>
      </div>
      <!-- <div>
        <div class="finance-summary">
          <span>income usd:</span>
          <span class="green-color" data-role="income-usd">0</span>
        </div>
        <div class="finance-summary">
          <span>expense usd:</span>
          <span class="red-color" data-role="expense-usd">0</span>
        </div>
        <div class="finance-summary">
          <span>summary usd:</span>
          <span class="blue-color" data-role="result-usd">0</span>
        </div>
      </div> -->
    </div>
  </template>
  
  <template id="iconSize" data-ui="icon" data-action="size">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 10V4h6"/>
      <path d="M20 14v6h-6"/>
    </svg>
  </template>
  <template id="iconSave" data-ui="icon" data-action="save">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h14l2 2v14H4z"/>
      <path d="M16 4v6H8V4"/>
      <rect x="8" y="14" width="8" height="4" rx="1"/>
    </svg>
  </template>
  <template id="iconPin" data-ui="icon" data-action="pin">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 4l6 6"/>
      <path d="M8 10l6 6"/>
      <path d="M9 15l-5 5"/>
      <path d="M15 9l5-5"/>
    </svg>
  </template>
  <template id="iconHide" data-ui="icon" data-action="hide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
      <circle cx="12" cy="12" r="3"/>
      <path d="M3 3l18 18"/>
    </svg>
  </template>
  <template id="iconFavorite" data-ui="icon" data-action="favorite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 17.8 6.1 21l1.2-6.5L2.5 9.9l6.6-.9z"/>
    </svg>
  </template>
  <template id="iconWorkplace" data-ui="icon" data-action="workplace">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  </template>

  <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
  <script type="module" src="./js/index.js"></script>
</body>
</html>
